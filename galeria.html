    <div class="card">
      <img src="assets/petisco1.png" alt="Petisco refinado" style="width:100%; border-radius: 12px;">

  </div>
  <div class="container">
    <h1>Galeria de Petiscos</h1>

    <div class="galeria">
      <img src="https://raw.githubusercontent.com/jbmsolucoes/assets/main/petisco1.jpg" alt="Tábua de queijos e frios" />
