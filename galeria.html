<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Galeria de Petiscos | JBMSoluções</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      color: #800000;
      text-align: center;
      margin-bottom: 30px;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .galeria-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .galeria-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.3s ease;
    }
    .galeria-item:hover img {
      transform: scale(1.05);
    }
    .galeria-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      font-size: 1em;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Início</a>
    <a href="experiencia.html">Experiência</a>
    <a href="depoimentos.html">Depoimentos</a>
    <a href="galeria.html">Galeria</a>
    <a href="faq.html">FAQ</a>
  </nav>

  <div class="container">
    <h1>Galeria de Petiscos</h1>

    <div class="galeria">
      <div class="galeria-item">
        <img src="assets/petisco01.jpg" alt="Tábua de queijos e frios">
        <div class="caption">Tábua de queijos e frios</div>
      </div>
      <div class="galeria-item">
        <img src="assets/petisco02.jpg" alt="Mesa decorada com petiscos">
        <div class="caption">Mesa decorada com petiscos</div>
      </div>
      <div class="galeria-item">
        <img src="assets/petisco03.jpg" alt="Escondidinho gourmet de carne de sol">
        <div class="caption">Escondidinho gourmet de carne de sol</div>
      </div>
      <div class="galeria-item">
        <img src="assets/petisco04.jpg" alt="Lasanha quatro queijos gratinada">
        <div class="caption">Lasanha quatro queijos gratinada</div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 JBMSoluções | <a href="index.html">Voltar ao Início</a></p>
  </footer>
</body>
</html>
