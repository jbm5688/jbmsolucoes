<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Galeria de Petiscos | JBMSoluções</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .galeria img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s;
    }
    .galeria img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

  <div class="container">

    <div class="galeria">
      <img src="assets/petisco01.jpg" alt="Tábua de queijos e frios">
      <img src="assets/petisco02.jpg" alt="Mesa decorada com petiscos">
      <img src="assets/petisco03.jpg" alt="Escondidinho gourmet de carne de sol">
      <img src="assets/petisco04.jpg" alt="Lasanha quatro queijos gratinada">
    </div>
  </div>
